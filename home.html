<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>云间引渡（Github代理）</title>
  <style>
    :root {
      --bg: #0d1117;
      --panel: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --input: #0d1117;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at top, rgba(31,111,235,0.18), transparent 38%),
        linear-gradient(180deg, #0d1117 0%, #0b0f14 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }
    .wrap {
      width: 100%;
      height: 100vh;
      padding: 10px;
    }
    .card {
      width: 100%;
      height: 100%;
      background: rgba(22,27,34,0.92);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
      backdrop-filter: blur(8px);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .hero {
      text-align: center;
      padding: 4px 0 14px;
    }
    h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.2;
      letter-spacing: 0.08em;
    }
    .workspace {
      display: grid;
      gap: 10px;
      min-height: 0;
      flex: 1;
      padding: 14px;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      background: rgba(10,14,20,0.42);
    }
    .module-title {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      margin-bottom: 2px;
    }
    .module-title strong {
      font-size: 15px;
      letter-spacing: 0.16em;
      color: #dfe7f1;
    }
    .module-title strong::before,
    .section-title strong::before {
      content: '|';
      display: inline-block;
      margin-right: 8px;
      color: #4b5667;
      letter-spacing: 0;
    }
    .row {
      display: grid;
      grid-template-columns: 56px minmax(0, 1fr);
      gap: 10px;
      align-items: stretch;
    }
    .label {
      display: flex;
      align-items: center;
      color: var(--muted);
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      white-space: nowrap;
      padding-left: 0;
    }
    .control {
      min-width: 0;
      min-height: 52px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: rgba(13,17,23,0.9);
      display: flex;
      align-items: center;
      padding: 0 14px;
      overflow: hidden;
    }
    .control.output-control {
      color: #66707c;
    }
    input[type="text"] {
      width: 100%;
      background: transparent;
      color: var(--text);
      border: 0;
      padding: 0;
      font-size: 15px;
      outline: none;
      min-width: 0;
    }
    input[type="text"]::placeholder { color: #66707c; }
    .output-value {
      width: 100%;
      min-width: 0;
      color: var(--text);
      font-size: 15px;
      line-height: 1.4;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .output-value.placeholder {
      color: #66707c;
    }
    .actions {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }
    button {
      appearance: none;
      border: 1px solid #2a313c;
      border-radius: 14px;
      padding: 14px 18px;
      font-size: 14px;
      font-weight: 600;
      line-height: 1;
      cursor: pointer;
      color: #e3eaf3;
      background: linear-gradient(180deg, #171b23 0%, #10151c 100%);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
      transition: transform 0.15s ease, border-color 0.15s ease, color 0.15s ease, background-color 0.15s ease;
    }
    button:hover { transform: translateY(-1px); }
    .btn-primary { border-color: rgba(74,192,96,0.32); }
    .btn-primary:hover { border-color: rgba(74,192,96,0.48); color: #f2fff4; }
    .btn-secondary { border-color: rgba(68,128,255,0.32); }
    .btn-secondary:hover { border-color: rgba(68,128,255,0.48); color: #f2f6ff; }
    .btn-warning { border-color: rgba(223,180,86,0.32); }
    .btn-warning:hover { border-color: rgba(223,180,86,0.48); color: #fffaf0; }
    .result-status {
      min-width: 72px;
      text-align: right;
      color: #d8dee9;
      font-size: 12px;
      letter-spacing: 0.04em;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.2s ease;
    }
    .result-status.show { opacity: 1; }
    .section {
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex;
      flex-direction: column;
      min-height: 0;
      flex: 1;
    }
    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .section-title strong {
      font-size: 16px;
      letter-spacing: 0.2px;
    }
    .whitelist-panel {
      border: 1px solid var(--border);
      border-radius: 14px;
      background: rgba(13,17,23,0.74);
      flex: 1;
      min-height: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .whitelist-meta {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      padding: 12px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      color: var(--muted);
      font-size: 13px;
    }
    .whitelist-meta code {
      color: #c9d1d9;
      background: rgba(255,255,255,0.04);
      padding: 2px 6px;
      border-radius: 6px;
    }
    .whitelist-table-wrap {
      overflow: auto;
      flex: 1;
      min-height: 0;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .whitelist-table-wrap::-webkit-scrollbar { width: 0; height: 0; }
    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }
    thead th {
      text-align: left;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      background: rgba(255,255,255,0.02);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding: 10px 12px;
    }
    tbody td {
      padding: 10px 12px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      font-size: 14px;
      color: var(--text);
      white-space: normal;
      word-break: break-word;
    }
    tbody tr:last-child td { border-bottom: 0; }
    .whitelist-host { font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, monospace; }
    th:first-child,
    td:first-child {
      width: 42px;
      min-width: 42px;
      max-width: 42px;
      padding-right: 8px;
      text-align: center;
    }
    @media (max-width: 640px) {
      .wrap { padding: 8px; }
      .card { padding: 14px; border-radius: 16px; }
      h1 { font-size: 24px; }
      .row { grid-template-columns: 46px minmax(0, 1fr); gap: 8px; }
      .label { padding-left: 0; }
      .actions { grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; }
      button { width: 100%; }
      .whitelist-meta { flex-direction: column; }
      thead th,
      tbody td {
        padding: 8px 10px;
      }
      th:first-child,
      td:first-child {
        width: 34px;
        min-width: 34px;
        max-width: 34px;
        padding-right: 6px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="hero">
        <h1>云间引渡（Github代理）</h1>
      </div>

      <div class="workspace">
        <div class="module-title"><strong>迁津</strong></div>
        <div class="row">
          <span class="label">输入</span>
          <div class="control">
            <input id="url" type="text" placeholder="例如：https://github.com/user/repo 或 raw.githubusercontent.com/user/repo/main/file.js" autocomplete="off" />
          </div>
        </div>

        <div class="row">
          <span class="label">输出</span>
          <div class="control output-control">
            <span class="output-value placeholder" id="result">生成后的代理链接会显示在这里</span>
            <span class="result-status" id="toast" aria-live="polite"></span>
          </div>
        </div>

        <div class="actions">
          <button class="btn-primary" onclick="convertOnly()">转换</button>
          <button class="btn-warning" onclick="copyProxy()">复制</button>
          <button class="btn-secondary" onclick="openProxy()">打开</button>
        </div>

        <div class="section">
          <div class="section-head">
            <div class="section-title"><strong>嘉录</strong></div>
          </div>

          <div class="whitelist-panel">
            <div class="whitelist-meta">
              <div>白名单数量：<code id="whitelistCount"></code></div>
            </div>
            <div class="whitelist-table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>#</th>
                    <th>域名</th>
                  </tr>
                </thead>
                <tbody id="whitelistBody"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const input = document.getElementById('url');
    const result = document.getElementById('result');
    const whitelistBody = document.getElementById('whitelistBody');
    const whitelistCount = document.getElementById('whitelistCount');
    const toast = document.getElementById('toast');
    const proxyBaseHost = 'ssr.ddns-ip.net';
    const whitelist = [
      'github.com',
      'avatars.githubusercontent.com',
      'github.githubassets.com',
      'collector.github.com',
      'api.github.com',
      'raw.githubusercontent.com',
      'gist.githubusercontent.com',
      'github.io',
      'assets-cdn.github.com',
      'cdn.jsdelivr.net',
      'securitylab.github.com',
      'www.githubstatus.com',
      'npmjs.com',
      'git-lfs.github.com',
      'githubusercontent.com',
      'github.global.ssl.fastly.net',
      'api.npms.io',
      'github.community',
      'desktop.github.com',
      'central.github.com'
    ];

    function normalizeInput(v) {
      return (v || '').trim();
    }

    function buildProxyUrl(input) {
      if (!input) return null;
      let raw = input.trim();
      if (!raw) return null;
      if (!/^https?:\/\//i.test(raw)) raw = 'https://' + raw;
      try {
        const u = new URL(raw);
        const host = u.host.toLowerCase();
        if (whitelist.indexOf(host) === -1) return null;
        const proxyPrefix = host.replace(/\./g, '-') + '-gh.';
        const proxy = new URL(u.href);
        proxy.protocol = 'https:';
        proxy.host = proxyPrefix + proxyBaseHost;
        return proxy.href;
      } catch (e) {
        return null;
      }
    }

    function renderWhitelist() {
      whitelistCount.textContent = String(whitelist.length);
      whitelistBody.innerHTML = whitelist.map(function (domain, index) {
        return '<tr>' +
          '<td>' + (index + 1) + '</td>' +
          '<td class="whitelist-host">' + domain + '</td>' +
        '</tr>';
      }).join('');
    }

    function setOutput(text, isPlaceholder) {
      result.textContent = text;
      result.classList.toggle('placeholder', !!isPlaceholder);
    }

    function showToast(text) {
      toast.textContent = text;
      toast.classList.add('show');
      window.clearTimeout(window.__toastTimer);
      window.__toastTimer = window.setTimeout(function () {
        toast.classList.remove('show');
      }, 1200);
    }

    async function convertUrl() {
      const raw = normalizeInput(input.value);
      if (!raw) {
        setOutput('请先输入链接', true);
        return null;
      }
      const localTarget = buildProxyUrl(raw);
      if (location.protocol === 'file:' || !location.hostname || location.hostname === '') {
        if (!localTarget) {
          setOutput('链接无效，或当前域名不在白名单中', true);
          return null;
        }
        setOutput(localTarget, false);
        return localTarget;
      }
      const api = '/api/convert?url=' + encodeURIComponent(raw);
      try {
        const res = await fetch(api, { method: 'GET' });
        const data = await res.json();
        if (!res.ok || !data.ok || !data.proxy_url) {
          if (localTarget) {
            setOutput(localTarget, false);
            return localTarget;
          }
          setOutput('链接无效，或当前域名不在白名单中', true);
          return null;
        }
        setOutput(data.proxy_url, false);
        return data.proxy_url;
      } catch (e) {
        if (localTarget) {
          setOutput(localTarget, false);
          return localTarget;
        }
        setOutput('转换失败：' + e.message, true);
        return null;
      }
    }

    async function convertOnly() { await convertUrl(); }

    async function openProxy() {
      const target = await convertUrl();
      if (!target) return;
      const w = window.open(target, '_blank', 'noopener,noreferrer');
      if (!w) location.href = target;
    }

    async function copyProxy() {
      const target = await convertUrl();
      if (!target) return;
      try {
        await navigator.clipboard.writeText(target);
        showToast('已复制');
      } catch (e) {
        showToast('复制失败');
      }
    }

    input.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') openProxy();
    });

    renderWhitelist();
  </script>
</body>
</html>
